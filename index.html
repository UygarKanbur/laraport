<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e74c3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Engelsiz Yol">
    <title>Engelsiz Yol Bildirimi</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #e74c3c;
            --secondary-color: #2c3e50;
        }

        /* SAYFA YENİLENMESİNİ ENGELLEYEN KOD BURASI */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Kaydırma çubuklarını gizle */
            overscroll-behavior: none; /* Aşağı çekince yenilemeyi kapat */
             /* Dokunmatik karmaşasını önle */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Harita Alanı */
        #map {
            width: 100%;
            height: 100%; /* Tüm ekranı kapla */
            z-index: 1;
            touch-action: none;
        }

        /* Üst Bilgi */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none; /* Haritaya tıklamayı engellemesin */
        }

        /* Buton Alanı */
        .action-area {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            width: 80%;
            text-align: center;
        }

        #btn-report {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.3rem;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* Mobilde dokunmayı iyileştirir */
            touch-action: manipulation; 
        }

        /* Modal ve Diğerleri */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center;
            align-items: end;
        }

        .modal-content {
            background-color: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 25px;
            padding-bottom: 50px; /* iPhone alt çubuğu için pay */
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from {transform: translateY(100%);} to {transform: translateY(0);} }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .cat-btn {
            background: #f8f9fa;
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .cat-btn i { font-size: 1.5rem; color: var(--secondary-color); }
        
        .close-btn {
            width: 100%;
            padding: 15px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 10px;
        }

        #loader {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 4000;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-wheelchair"></i> Engelsiz Yol
    </header>

    <div id="map"></div>

    <div class="action-area">
        <button id="btn-report" onclick="openReportModal()">
            <i class="fas fa-exclamation-circle"></i> SORUN BİLDİR
        </button>
    </div>

    <div id="modal-categories" class="modal">
        <div class="modal-content">
            <h3 style="text-align: center; margin-top: 0;">Sorun Türü?</h3>
            <div class="category-grid">
                <button class="cat-btn" onclick="submitReport('Araç Park Etmiş')">
                    <i class="fas fa-car"></i> Kaldırımda Araç
                </button>
                <button class="cat-btn" onclick="submitReport('Kaldırım Bozuk')">
                    <i class="fas fa-road"></i> Bozuk Zemin
                </button>
                <button class="cat-btn" onclick="submitReport('İnşaat/Çalışma')">
                    <i class="fas fa-hard-hat"></i> Çalışma Var
                </button>
                <button class="cat-btn" onclick="submitReport('Rampa Sorunu')">
                    <i class="fas fa-walking"></i> Rampa Hatalı
                </button>
            </div>
            <button class="close-btn" onclick="closeModal()">İptal</button>
        </div>
    </div>

    <div id="loader">
        <i class="fas fa-spinner fa-spin fa-2x"></i>
        <p>İşleniyor...</p>
    </div>

    <script>
        // --- BURAYA KENDİ GOOGLE SCRIPT LİNKİNİZİ YAPIŞTIRIN ---
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIslgMQmpl3s_NnsgW-_mcCLapR_Ez2nemIUwlk_PR2ZF5MsHKG-SmLQjN_ov5DSSd/exec'; 
        
        let map;
        let userLat = 0;
        let userLng = 0;
        let userMarker;

        function initMap() {

            function initMap() {
    // Pull-to-refresh'i tüm cihazlarda engelle (iOS dahil)
            document.addEventListener('touchmove', function(e) {
            e.preventDefault();
            }, { passive: false });
        
    // ... geri kalan initMap kodunuz devam eder
            // Haritayı başta Türkiye genelinde başlat (GPS alınana kadar)
            map = L.map('map', {
                zoomControl: false // Mobilde zoom butonları yer kaplamasın
            }).setView([39.9334, 32.8597], 6);

            // Access Blocked hatasını çözen CartoDB katmanı
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);

            // Mevcut verileri çek
            fetchExistingReports();

            // --- OTOMATİK KONUM ALMA ---
            // Uygulama açılır açılmaz konumu bulmaya çalış
            locateUser(true);
        }

        function locateUser(isStartup) {
            if (navigator.geolocation) {
                // Konum istenirken loader göstermiyoruz ki harita kilitlenmesin
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        
                        // Konuma uç
                        map.setView([userLat, userLng], 18);

                        // Mavi nokta (Kullanıcı) güncelle
                        if (userMarker) {
                            userMarker.setLatLng([userLat, userLng]);
                        } else {
                            userMarker = L.circleMarker([userLat, userLng], {
                                color: '#3498db',
                                fillColor: '#3498db',
                                fillOpacity: 1,
                                radius: 8
                            }).addTo(map).bindPopup("Buradasınız");
                        }
                    }, 
                    (error) => {
                        console.log("Konum alınamadı: ", error);
                        if(!isStartup) alert("Konum alınamadı. Lütfen GPS'i açın.");
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        // Butona basınca menüyü aç (Konumu da tazele)
        function openReportModal() {
            // Konumu garantiye almak için tekrar iste
            locateUser(false); 
            // Menüyü aç
            document.getElementById('modal-categories').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-categories').style.display = 'none';
        }

        function submitReport(problemType) {
            if (userLat === 0) {
                alert("Konumunuz henüz bulunamadı. Lütfen biraz bekleyip tekrar deneyin.");
                locateUser(false);
                return;
            }

            closeModal();
            document.getElementById('loader').style.display = 'block';

            const data = {
                type: problemType,
                lat: userLat,
                lng: userLng,
                timestamp: new Date().toLocaleString()
            };

            // Haritaya hemen ekle (Görsel geri bildirim)
            L.marker([userLat, userLng]).addTo(map)
             .bindPopup(`<b>${problemType}</b><br>Şimdi eklendi`);

            // Google Sheets'e gönder
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Bildiriminiz kaydedildi!");
            })
            .catch(error => {
                document.getElementById('loader').style.display = 'none';
                alert("Bildirim gönderildi (Offline mod).");
            });
        }

        function fetchExistingReports() {
            fetch(GOOGLE_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                data.forEach(point => {
                    let lat = parseFloat(point.lat);
                    let lng = parseFloat(point.lng);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        L.marker([lat, lng]).addTo(map)
                         .bindPopup(`<b>${point.type}</b><br><small>${point.time}</small>`);
                    }
                });
            });
        }

        window.onload = initMap;
    </script>

    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('Service Worker kayıtlı'))
      .catch(err => console.log('SW hatası:', err));
  }
    </script>
</body>
</html>
