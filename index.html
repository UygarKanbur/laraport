<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Engelsiz Yol</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #e74c3c; --dark: #2c3e50; }

        /* AGRESİF YENİLEME ENGELLEYİCİ */
        html {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            overscroll-behavior: none;
            position: fixed; /* Sayfayı çivile */
            width: 100%;
        }

        #map {
            width: 100%; height: 100%;
            z-index: 1;
            background: #ddd;
        }

        /* Başlık ve Butonlar */
        header {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(44, 62, 80, 0.9);
            color: white; padding: 15px;
            text-align: center; font-weight: bold;
            z-index: 1000;
        }

        .action-area {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 85%; z-index: 2000;
        }

        #btn-report {
            background: var(--primary); color: white;
            border: none; padding: 15px; border-radius: 50px;
            width: 100%; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex; justify-content: center; gap: 10px;
        }

        /* Modal */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000;
            align-items: end;
        }
        .modal-content {
            background: white; width: 100%;
            padding: 20px; border-radius: 20px 20px 0 0;
            padding-bottom: 50px;
        }
        .category-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }
        .cat-btn {
            padding: 15px; background: #f1f2f6; border: 2px solid #ddd;
            border-radius: 10px; text-align: center;
        }
        .close-btn {
            width: 100%; padding: 15px; background: #95a5a6;
            color: white; border: none; border-radius: 10px;
        }
        
        #loader {
            display: none; position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 10px;
            z-index: 4000; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header><i class="fas fa-wheelchair"></i> Engelsiz Yol</header>
    <div id="map"></div>
    
    <div class="action-area">
        <button id="btn-report" onclick="openReportModal()">
            <i class="fas fa-exclamation-circle"></i> SORUN BİLDİR
        </button>
    </div>

    <div id="modal-categories" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-top:0">Sorun Tipi</h3>
            <div class="category-grid">
                <button class="cat-btn" onclick="submitReport('Araç Park Etmiş')"><i class="fas fa-car"></i><br>Araç</button>
                <button class="cat-btn" onclick="submitReport('Kaldırım Bozuk')"><i class="fas fa-road"></i><br>Bozuk</button>
                <button class="cat-btn" onclick="submitReport('İnşaat Çalışması')"><i class="fas fa-hard-hat"></i><br>Çalışma</button>
                <button class="cat-btn" onclick="submitReport('Rampa Sorunu')"><i class="fas fa-walking"></i><br>Rampa</button>
            </div>
            <button class="close-btn" onclick="closeModal()">İptal</button>
        </div>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br>İşlem yapılıyor...</div>

    <script>
        // --- LİNKİ BURAYA YAPIŞTIRIN ---
        const GOOGLE_SCRIPT_URL = 'BURAYA_GOOGLE_APPS_SCRIPT_URL_GELECEK'; 

        let map, userMarker;
        let userLat = 0, userLng = 0;
        let markersGroup; // Tüm işaretçileri tutan grup

        function initMap() {
            // Harita ayarları
            map = L.map('map', {
                zoomControl: false,
                bounceAtZoomLimits: false,
                attributionControl: false
            }).setView([39.9334, 32.8597], 6);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 20
            }).addTo(map);

            markersGroup = L.featureGroup().addTo(map);

            // Verileri Çek
            fetchExistingReports();

            // Konumu Bul
            locateUser();

            // TELEFONDA YENİLENMEYİ ENGELLEYEN JAVASCRIPT
            // Sadece harita dışındaki yerlere dokununca varsayılanı engelle
            document.body.addEventListener('touchmove', function(e) {
                // Eğer dokunulan yer harita değilse (örneğin başlık), kaydırmayı engelle
                if (!e.target.closest('.leaflet-container')) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        function locateUser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;

                    if(userMarker) userMarker.remove();
                    
                    userMarker = L.circleMarker([userLat, userLng], {
                        color: '#2980b9', fillColor: '#3498db', fillOpacity: 1, radius: 8
                    }).addTo(map).bindPopup("Siz");
                    
                    // Haritayı kullanıcıya odakla
                    map.setView([userLat, userLng], 17);
                }, err => {
                    // Konum hatası sessiz kalsın, harita çalışmaya devam etsin
                    console.log(err);
                }, { enableHighAccuracy: true });
            }
        }

        function fetchExistingReports() {
            // HATA AYIKLAMA: Veri çekiliyor uyarısı
            // alert("Veriler sunucudan isteniyor..."); // İsterseniz bunu açın

            fetch(GOOGLE_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                if(data.length === 0) {
                    alert("Sistemde kayıtlı şikayet yok.");
                } else {
                    // Veri geldiyse ekrana yaz (Debug için)
                    // alert("Sunucudan " + data.length + " adet şikayet geldi."); 
                }

                data.forEach(p => {
                    let lat = parseFloat(p.lat);
                    let lng = parseFloat(p.lng);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        let m = L.marker([lat, lng])
                            .bindPopup(`<b>${p.type}</b><br>${p.time.substring(0,10)}`);
                        markersGroup.addLayer(m);
                    }
                });
            })
            .catch(err => {
                alert("Veri çekme hatası: " + err);
                console.error(err);
            });
        }

        function openReportModal() {
            locateUser();
            document.getElementById('modal-categories').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal-categories').style.display = 'none';
        }

        function submitReport(type) {
            if(userLat === 0) { alert("Konum alınıyor, lütfen bekleyin..."); locateUser(); return; }
            
            closeModal();
            document.getElementById('loader').style.display = 'block';

            const payload = { type: type, lat: userLat, lng: userLng, timestamp: new Date().toLocaleString() };

            // Haritaya hemen ekle
            L.marker([userLat, userLng]).addTo(markersGroup).bindPopup(type);

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            })
            .then(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Bildirim başarıyla gönderildi.");
            })
            .catch(e => {
                document.getElementById('loader').style.display = 'none';
                alert("Gönderildi (Çevrimdışı Mod)");
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
